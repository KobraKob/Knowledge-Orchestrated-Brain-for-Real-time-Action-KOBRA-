<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KOBRA • APEX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       TOKENS — KOBRA APEX PREDATOR THEME
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    :root {
      /* Deep abyss background */
      --bg: #030304;
      --s1: #0a0b0e;
      --s2: #111318;
      --s3: #181b22;
      --s4: #222630;

      /* Venom Green accents — aggressive and toxic */
      --neon: #ccff00;
      --neon-2: #99ff00;
      --neon-dim: rgba(204, 255, 0, 0.08);
      --neon-glow: rgba(204, 255, 0, 0.3);

      /* Borders */
      --border: rgba(204, 255, 0, 0.15);
      --border-hi: rgba(204, 255, 0, 0.35);

      /* Typography */
      --tx: #f4f7fa;
      --tx-2: #b4bfcc;
      --tx-3: #6e7a8a;
      --tx-4: #3c4552;

      /* Status palette */
      --green: #00ff66;
      --red: #ff003c;
      --blue: #00e5ff;
      --orange: #ff4400;
      --violet: #b700ff;

      /* Brutalist / Sharp corners for robotic feel */
      --r: 2px;
      --r-md: 4px;
      --r-lg: 8px;
      --r-xl: 12px;
    }

    /* Synthetic serpentine grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(30deg, var(--s1) 12%, transparent 12.5%, transparent 87%, var(--s1) 87.5%, var(--s1)),
        linear-gradient(150deg, var(--s1) 12%, transparent 12.5%, transparent 87%, var(--s1) 87.5%, var(--s1)),
        linear-gradient(30deg, var(--s1) 12%, transparent 12.5%, transparent 87%, var(--s1) 87.5%, var(--s1)),
        linear-gradient(150deg, var(--s1) 12%, transparent 12.5%, transparent 87%, var(--s1) 87.5%, var(--s1)),
        linear-gradient(60deg, rgba(204, 255, 0, 0.01) 25%, transparent 25.5%, transparent 75%, rgba(204, 255, 0, 0.01) 75%, rgba(204, 255, 0, 0.01)),
        linear-gradient(60deg, rgba(204, 255, 0, 0.01) 25%, transparent 25.5%, transparent 75%, rgba(204, 255, 0, 0.01) 75%, rgba(204, 255, 0, 0.01));
      background-size: 40px 70px;
      background-position: 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
      pointer-events: none;
      z-index: -1;
      opacity: 0.8;
      animation: snake-drift 40s linear infinite;
    }

    @keyframes snake-drift {
      to {
        background-position: 0 70px, 0 70px, 20px 105px, 20px 105px, 0 70px, 20px 105px;
      }
    }

    /* Scanline HUD overlay */
    .app::after {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: repeating-linear-gradient(to bottom,
          transparent 0px, transparent 3px,
          rgba(204, 255, 0, 0.03) 3px, rgba(204, 255, 0, 0.03) 4px);
      animation: scan 8s linear infinite;
      mix-blend-mode: screen;
      opacity: 0.8;
    }

    @keyframes scan {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 0 100%;
      }
    }

    /* ━━ Reset & Base ━━ */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--tx);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    /* Scrollbars — cyber thin */
    * {
      scrollbar-width: thin;
      scrollbar-color: var(--neon) transparent;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--neon);
      border-radius: 0;
      box-shadow: 0 0 8px var(--neon-glow);
    }

    /* Ambient core glow */
    #ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      transition: background 1.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.s-standby #ambient {
      background: radial-gradient(ellipse 60% 45% at 70% 20%, rgba(204, 255, 0, 0.03) 0%, transparent 75%);
    }

    body.s-listening #ambient {
      background: radial-gradient(ellipse 60% 45% at 70% 20%, rgba(0, 255, 102, 0.08) 0%, transparent 75%);
    }

    body.s-thinking #ambient {
      background: radial-gradient(ellipse 60% 45% at 70% 20%, rgba(255, 68, 0, 0.08) 0%, transparent 75%);
    }

    body.s-speaking #ambient {
      background: radial-gradient(ellipse 60% 45% at 70% 20%, rgba(204, 255, 0, 0.1) 0%, transparent 75%);
    }

    body.s-wake #ambient {
      background: radial-gradient(ellipse 60% 45% at 70% 20%, rgba(255, 0, 60, 0.08) 0%, transparent 75%);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       LAYOUT
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .app {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-rows: 60px 1fr 80px;
      height: 100vh;
    }

    main {
      display: grid;
      grid-template-columns: 1fr 360px;
      overflow: hidden;
      border-top: 2px solid var(--border);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       HEADER
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    header {
      display: flex;
      align-items: center;
      padding: 0 24px;
      background: rgba(10, 11, 14, 0.85);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-hi);
      gap: 20px;
      position: relative;
      z-index: 50;
    }

    /* Logo — Predatory Angular Design */
    .logo {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--neon);
      border-radius: var(--r);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--neon-glow), inset 0 0 10px rgba(0, 0, 0, 0.5);
      clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 22px;
      height: 22px;
      color: #000;
    }

    .logo-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 6px;
      color: var(--tx);
      text-shadow: 0 0 15px var(--neon-glow);
    }

    .logo-badge {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--neon);
      background: transparent;
      border: 1px solid var(--neon);
      padding: 2px 8px;
      font-weight: 700;
      box-shadow: 0 0 10px var(--neon-dim);
      clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
    }

    /* Status core */
    .status-pill {
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 6px 24px 6px 16px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border);
      clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
      box-shadow: 0 0 10px var(--neon-dim);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .s-dot {
      width: 10px;
      height: 10px;
      background: var(--tx-3);
      box-shadow: 0 0 8px currentColor;
      transition: all 0.4s;
      transform: rotate(45deg);
    }

    #s-label {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--tx-3);
      min-width: 100px;
      text-align: center;
    }

    /* Right cluster */
    .h-right {
      display: flex;
      align-items: center;
      gap: 24px;
      flex-shrink: 0;
    }

    .h-stat {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }

    .h-stat-lbl {
      font-size: 9px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--tx-3);
      font-weight: 700;
    }

    .h-stat-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      color: var(--neon);
      font-weight: 600;
      text-shadow: 0 0 8px var(--neon-dim);
    }

    #hdr-clock {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: var(--tx);
      letter-spacing: 2px;
      border-right: 1px solid var(--border);
      padding-right: 20px;
    }

    .conn-dot {
      width: 12px;
      height: 12px;
      background: var(--red);
      box-shadow: 0 0 12px var(--red);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      transition: all 0.4s;
    }

    .conn-dot.on {
      background: var(--neon);
      box-shadow: 0 0 15px var(--neon);
      animation: conn-pulse 1.5s ease-in-out infinite;
    }

    @keyframes conn-pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.85);
      }
    }

    /* State overrides */
    body.s-listening .s-dot {
      background: var(--green);
      box-shadow: 0 0 16px var(--green);
      animation: dot-pulse 1s infinite;
    }

    body.s-listening #s-label {
      color: var(--green);
      text-shadow: 0 0 8px var(--green);
    }

    body.s-thinking .s-dot {
      background: var(--orange);
      box-shadow: 0 0 16px var(--orange);
      animation: dot-pulse 0.5s infinite;
    }

    body.s-thinking #s-label {
      color: var(--orange);
      text-shadow: 0 0 8px var(--orange);
    }

    body.s-speaking .s-dot {
      background: var(--neon);
      box-shadow: 0 0 20px var(--neon);
      animation: dot-pulse 0.3s infinite;
    }

    body.s-speaking #s-label {
      color: var(--neon);
      text-shadow: 0 0 10px var(--neon);
    }

    body.s-wake .s-dot {
      background: var(--red);
      box-shadow: 0 0 20px var(--red);
    }

    body.s-wake #s-label {
      color: var(--red);
      text-shadow: 0 0 10px var(--red);
    }

    @keyframes dot-pulse {

      0%,
      100% {
        transform: scale(1) rotate(45deg);
      }

      50% {
        transform: scale(1.5) rotate(45deg);
      }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       LEFT — CHAT
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .chat-col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 1px solid var(--border);
      background: rgba(3, 3, 4, 0.6);
      backdrop-filter: blur(4px);
    }

    #conv {
      flex: 1;
      overflow-y: auto;
      padding: 40px 32px 20px;
      display: flex;
      flex-direction: column;
      gap: 30px;
      scroll-behavior: smooth;
    }

    /* Messages */
    .msg {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-width: 80%;
      animation: msg-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes msg-in {
      from {
        opacity: 0;
        transform: translateX(-20px) skewX(5deg);
      }

      to {
        opacity: 1;
        transform: translateX(0) skewX(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      align-items: flex-end;
      animation-name: msg-in-user;
    }

    @keyframes msg-in-user {
      from {
        opacity: 0;
        transform: translateX(20px) skewX(-5deg);
      }

      to {
        opacity: 1;
        transform: translateX(0) skewX(0);
      }
    }

    .msg.kobra {
      align-self: flex-start;
      align-items: flex-start;
    }

    .msg-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .msg.user .msg-meta {
      flex-direction: row-reverse;
    }

    .msg-sender {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .msg.user .msg-sender {
      color: var(--tx-2);
    }

    .msg.kobra .msg-sender {
      color: var(--neon);
      text-shadow: 0 0 8px var(--neon-glow);
    }

    .msg-ts {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--tx-4);
    }

    .msg-bubble {
      padding: 16px 20px;
      font-size: 15px;
      line-height: 1.7;
      word-break: break-word;
      position: relative;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.5);
    }

    .msg.user .msg-bubble {
      background: var(--s2);
      border: 1px solid var(--border-hi);
      border-radius: var(--r-xl) 0 var(--r-xl) var(--r-xl);
      color: var(--tx);
    }

    .msg.kobra .msg-bubble {
      background: linear-gradient(135deg, rgba(204, 255, 0, 0.1) 0%, rgba(0, 0, 0, 0.8) 100%);
      border: 1px solid var(--neon-glow);
      border-radius: 0 var(--r-xl) var(--r-xl) var(--r-xl);
      color: var(--tx);
    }

    .msg.kobra .msg-bubble::before {
      content: '';
      position: absolute;
      left: -2px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--neon);
      box-shadow: 0 0 10px var(--neon);
    }

    /* Typing cursor */
    .typing::after {
      content: '█';
      color: var(--neon);
      animation: blink 0.5s step-end infinite;
      font-size: 0.9em;
      margin-left: 4px;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* System banner */
    .msg-sys {
      align-self: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #000;
      border-radius: var(--r);
      padding: 6px 24px;
      background: var(--neon);
      box-shadow: 0 0 15px var(--neon-glow);
      clip-path: polygon(5% 0, 100% 0, 95% 100%, 0 100%);
      animation: msg-sys-in 0.5s ease both;
    }

    @keyframes msg-sys-in {
      from {
        opacity: 0;
        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       RIGHT — SYNAPTIC CORE PANEL
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    .ctrl-col {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: rgba(10, 11, 14, 0.9);
      backdrop-filter: blur(8px);
      border-left: 1px solid var(--neon-dim);
    }

    /* Visualizer — Snake Eye / Core */
    .viz-section {
      flex-shrink: 0;
      padding: 30px 22px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: relative;
    }

    .viz-wrap {
      position: relative;
      width: 170px;
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Angular Hexagon Borders for Visualizer */
    .viz-outer {
      position: absolute;
      inset: 0;
      border: 2px solid var(--border-hi);
      clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
      transition: all 0.4s ease;
      box-shadow: 0 0 40px var(--neon-dim);
    }

    body.s-listening .viz-outer {
      border-color: rgba(0, 255, 102, 0.6);
    }

    body.s-thinking .viz-outer {
      border-color: rgba(255, 68, 0, 0.6);
    }

    body.s-speaking .viz-outer {
      border-color: var(--neon);
      box-shadow: 0 0 50px var(--neon-glow);
    }

    body.s-wake .viz-outer {
      border-color: var(--red);
      box-shadow: 0 0 50px rgba(255, 0, 60, 0.4);
    }

    .viz-spin {
      position: absolute;
      inset: -10px;
      border: 2px dashed var(--neon);
      clip-path: polygon(50% 0%, 95% 25%, 95% 75%, 50% 100%, 5% 75%, 5% 25%);
      opacity: 0.1;
      animation: hex-spin 6s linear infinite;
    }

    body.s-thinking .viz-spin {
      opacity: 0.8;
      border-color: var(--orange);
      animation-duration: 2s;
    }

    @keyframes hex-spin {
      to {
        transform: rotate(360deg);
      }
    }

    #viz-cv {
      position: relative;
      z-index: 2;
    }

    .viz-lbl {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 5px;
      text-transform: uppercase;
      color: var(--tx-3);
      transition: all 0.4s;
      background: var(--s2);
      padding: 4px 16px;
      border: 1px solid var(--border);
    }

    body.s-listening .viz-lbl {
      color: var(--green);
      border-color: var(--green);
      text-shadow: 0 0 8px var(--green);
    }

    body.s-thinking .viz-lbl {
      color: var(--orange);
      border-color: var(--orange);
      text-shadow: 0 0 8px var(--orange);
    }

    body.s-speaking .viz-lbl {
      color: var(--bg);
      background: var(--neon);
      text-shadow: none;
    }

    body.s-wake .viz-lbl {
      color: var(--red);
      border-color: var(--red);
      text-shadow: 0 0 8px var(--red);
    }

    /* Section headers */
    .sec-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: rgba(204, 255, 0, 0.02);
    }

    .sec-name {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--tx-2);
    }

    .sec-cnt {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
      color: #000;
      background: var(--neon);
      padding: 2px 12px;
      clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
    }

    /* Memory chips (Venom Cache) */
    .mem-sec {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    #chips-wrap {
      padding: 16px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      max-height: 130px;
      overflow-y: auto;
    }

    .chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      background: var(--s2);
      border: 1px solid var(--border-hi);
      border-left: 3px solid var(--neon);
      transition: all 0.2s ease;
      animation: chip-strike 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    .chip:hover {
      background: rgba(204, 255, 0, 0.1);
      border-color: var(--neon);
      transform: translateX(4px);
    }

    @keyframes chip-strike {
      from {
        opacity: 0;
        transform: translateX(-15px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .chip-k {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--neon);
      flex-shrink: 0;
    }

    .chip-v {
      font-size: 12px;
      color: var(--tx);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }

    .chips-empty {
      font-size: 11px;
      color: var(--tx-4);
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 8px 0;
    }

    /* Activity log — Synaptic Log */
    .act-sec {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #act-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 0;
    }

    .act-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 10px 24px;
      border-left: 2px solid transparent;
      transition: all 0.2s;
      animation: row-slide 0.3s ease both;
    }

    .act-row:hover {
      background: rgba(204, 255, 0, 0.05);
      border-left-color: var(--neon);
    }

    @keyframes row-slide {
      from {
        opacity: 0;
        transform: translateX(15px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .act-pip {
      width: 8px;
      height: 8px;
      transform: rotate(45deg);
      flex-shrink: 0;
      margin-top: 5px;
    }

    .act-body {
      flex: 1;
      min-width: 0;
    }

    .act-tag {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .act-inf {
      font-size: 12.5px;
      color: var(--tx-2);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .act-time {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--tx-4);
      flex-shrink: 0;
    }

    .act-tool .act-pip {
      background: var(--neon);
      box-shadow: 0 0 8px var(--neon);
    }

    .act-tool .act-tag {
      color: var(--neon);
    }

    .act-sys .act-pip {
      background: var(--tx-3);
    }

    .act-sys .act-tag {
      color: var(--tx-3);
    }

    .act-err .act-pip {
      background: var(--red);
      box-shadow: 0 0 8px var(--red);
    }

    .act-err .act-tag {
      color: var(--red);
    }

    /* Bottom stats */
    .stats-strip {
      flex-shrink: 0;
      display: flex;
      border-top: 1px solid var(--border);
      background: var(--s1);
    }

    .stat-cell {
      flex: 1;
      padding: 14px 16px;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-cell:last-child {
      border-right: none;
    }

    .sc-lbl {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--tx-3);
    }

    .sc-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 600;
      color: var(--tx);
    }

    .sc-track {
      height: 4px;
      background: var(--s3);
      overflow: hidden;
    }

    .sc-fill {
      height: 100%;
      background: var(--neon);
      transition: width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 0 8px var(--neon);
    }

    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       FOOTER — Command Deck
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    footer {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 0 32px;
      background: rgba(10, 11, 14, 0.95);
      border-top: 2px solid var(--border-hi);
      position: relative;
    }

    /* Waveform indicator */
    .wf-wrap {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 40px;
      flex-shrink: 0;
    }

    .wbar {
      width: 4px;
      height: 4px;
      background: var(--neon);
      opacity: 0.2;
      transition: height 0.08s ease, opacity 0.3s;
      box-shadow: 0 0 6px var(--neon);
    }

    /* Input */
    .inp-row {
      flex: 1;
      display: flex;
      align-items: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
      transition: all 0.3s ease;
      position: relative;
    }

    .inp-row::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--neon);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .inp-row:focus-within::after {
      transform: scaleX(1);
    }

    .inp-pfx {
      padding: 0 12px 0 24px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 18px;
      font-weight: 800;
      color: var(--neon);
      flex-shrink: 0;
    }

    #t-inp {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--tx);
      font-family: 'Inter', sans-serif;
      font-size: 16px;
      padding: 22px 0;
      caret-color: var(--neon);
    }

    #t-inp::placeholder {
      color: var(--tx-4);
      font-style: italic;
    }

    .send-btn {
      margin: 10px 10px 10px 0;
      background: var(--neon);
      color: #000;
      border: none;
      border-radius: var(--r);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 2px;
      padding: 0 26px;
      height: 44px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
      transition: all 0.2s ease;
      clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
    }

    .send-btn:hover {
      background: #e6ff00;
      transform: translateX(2px);
      box-shadow: 0 0 25px var(--neon-glow);
    }

    .send-btn:active {
      transform: scale(0.96);
    }

    /* TOAST */
    .toast {
      position: fixed;
      top: 80px;
      right: 30px;
      z-index: 9999;
      background: var(--s1);
      border-left: 4px solid var(--neon);
      padding: 16px 24px;
      font-size: 14px;
      font-weight: 600;
      color: var(--tx);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 20px var(--neon-dim);
      animation: toast-strike 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    }

    @keyframes toast-strike {
      0% {
        opacity: 0;
        transform: translateX(50px) skewX(10deg);
      }

      100% {
        opacity: 1;
        transform: translateX(0) skewX(0);
      }
    }
  </style>
</head>

<body class="s-standby">

  <div class="app">

          </div>
          <div id="act-list"></div>
        </div>

        <div class="stats-strip">
          <div class="stat-cell">
            <span class="sc-lbl">SYNAPTIC LOAD</span>

              <div class="sc-fill" id="sc-cpu-f" style="width:0"></div>
            </div>
          </div>
          <div class="stat-cell">

            <span class="sc-val" id="sc-ram">--</span>
            <div class="sc-track">
              <div class="sc-fill" id="sc-ram-f" style="width:0;background:var(--neon-2)"></div>
            </div>
          </div>
          <div class="stat-cell">
            <span class="sc-lbl">THERMAL</span>

    <footer>
      <div class="wf-wrap" id="wf-wrap"></div>
      <div class="inp-row">
        <span class="inp-pfx">❯_</span>
        <input id="t-inp" type="text" placeholder="Engage KOBRA... (or say 'Wake Kobra')" autocomplete="off"
          spellcheck="false">
        <button class="send-btn" id="send-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
            stroke-linecap="square">
            <line x1="22" y1="2" x2="11" y2="13" />
            <polygon points="22 2 15 22 11 13 2 9 22 2" />
          </svg>
          STRIKE
        </button>
      </div>
    </footer>

  </div>

  <script>
    /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
       KOBRA UI ENGINE 
    ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
    const WS_URL = `ws://${location.host}/ws`;
    const RECONNECT = 1800;
    const TYPE_MS = 14;

    /* DOM Cache */
    const $body = document.body;
    const $conv = document.getElementById('conv');
    const $inp = document.getElementById('t-inp');
    const $acts = document.getElementById('act-list');
    const $chips = document.getElementById('chips-wrap');
    const $vizLbl = document.getElementById('viz-lbl');
    const $sLabel = document.getElementById('s-label');
    const $conn = document.getElementById('conn-dot');
    const $hCpu = document.getElementById('h-cpu'), $hRam = document.getElementById('h-ram'), $hBat = document.getElementById('h-bat'), $hClk = document.getElementById('hdr-clock');
    const $scCpu = document.getElementById('sc-cpu'), $scRam = document.getElementById('sc-ram'), $scBat = document.getElementById('sc-bat');
    const $cpuF = document.getElementById('sc-cpu-f'), $ramF = document.getElementById('sc-ram-f'), $batF = document.getElementById('sc-bat-f');
    const $facCnt = document.getElementById('fact-cnt'), $actCnt = document.getElementById('act-cnt');
    const $vizCv = document.getElementById('viz-cv'), $wfWrap = document.getElementById('wf-wrap');

    /* State */
    let curState = 'standby';
    let ws = null;
    let actCount = 0, facCount = 0;
    const facsMap = {};

    /* WebSocket Simulation/Connection */
    function connect() {
      ws = new WebSocket(WS_URL);
      ws.onopen = () => { $conn.classList.add('on'); addAct('sys', 'LINK', 'APEX neural handshake established'); };
      ws.onclose = () => { $conn.classList.remove('on'); addAct('err', 'LINK', 'Signal dropped — re-engaging'); setTimeout(connect, RECONNECT); };
      ws.onerror = () => { };
      ws.onmessage = e => { try { handle(JSON.parse(e.data)); } catch (_) { } };
    }

    function handle(ev) {
      switch (ev.type) {
        case 'status': setStatus(ev.state, ev.label); break;
        case 'transcript': addMsg('user', ev.text); addAct('sys', 'STT', clip(ev.text, 50)); break;
        case 'response': addMsg('kobra', ev.text, true); break;
        case 'tool_call': addAct('tool', ev.tool || 'EXEC', clip(ev.summary || '', 50)); break;
        case 'fact_saved': saveFact(ev.key, ev.value); showToast(`[ ${ev.key.toUpperCase()} ] secured in Scale Memory`); break;
        case 'facts_snapshot': if (ev.facts) Object.entries(ev.facts).forEach(([k, v]) => saveFact(k, v)); break;
        case 'system_stats': updateStats(ev); break;
        case 'error':
          addAct('err', 'ERR', clip(ev.message || 'Synapse failure', 50));
          addMsg('kobra', '⚠ ' + (ev.message || 'Engine glitch. Retrying.'));
          break;
      }
    }

    /* Status Engine */
    const STATE_MAP = {
      standby: { cls: 's-standby', lbl: 'DORMANT', wAmp: 4 },
      sleeping: { cls: 's-standby', lbl: 'DORMANT', wAmp: 2 },
      wake_word: { cls: 's-wake', lbl: 'TARGET ACQUIRED', wAmp: 18 },
      listening: { cls: 's-listening', lbl: 'PROCESSING AUDIO', wAmp: 30 },
      thinking: { cls: 's-thinking', lbl: 'ANALYZING', wAmp: 8 },
      speaking: { cls: 's-speaking', lbl: 'TRANSMITTING', wAmp: 24 },
    };
    function setStatus(s, custom) {
      curState = s;
      const m = STATE_MAP[s] || { cls: 's-standby', lbl: s.toUpperCase(), wAmp: 4 };
      $body.className = m.cls;
      $sLabel.textContent = custom || m.lbl;
      $vizLbl.textContent = custom || m.lbl;
      wTarget = m.wAmp;
    }

    /* Message UI */
    function ts() {
      const n = new Date();
      return [n.getHours(), n.getMinutes(), n.getSeconds()].map(x => String(x).padStart(2, '0')).join(':');
    }

    function addMsg(role, text, tw = false) {
      const wrap = el('div', `msg ${role}`);
      const meta = el('div', 'msg-meta');
      meta.innerHTML = `<span class="msg-sender">${role === 'user' ? 'OPERATOR' : 'KOBRA'}</span><span class="msg-ts">${ts()}</span>`;
      const bubble = el('div', 'msg-bubble');
      wrap.append(meta, bubble);
      $conv.appendChild(wrap);
      scrollConv();
      tw && role === 'kobra' ? typeWrite(bubble, text) : (bubble.textContent = text);
    }

    function scrollConv() { requestAnimationFrame(() => { $conv.scrollTop = $conv.scrollHeight; }); }

    function typeWrite(el, text) {
      el.textContent = ''; el.classList.add('typing');
      let i = 0;
      function next() {
        if (i >= text.length) { el.classList.remove('typing'); return; }
        el.textContent += text[i++];
        scrollConv();
        const ch = text[i - 1];
        const delay = /[.,!?;:]/.test(ch) ? TYPE_MS * 6 : ch === ' ' ? TYPE_MS * 1.5 : TYPE_MS;
        setTimeout(next, delay);
      }
      next();
    }

    /* Activity Log */
    const AT_CLS = { tool: 'act-tool', sys: 'act-sys', err: 'act-err' };
    function addAct(type, tag, info) {
      actCount++;
      $actCnt.textContent = actCount > 99 ? '99+' : actCount;
      const row = el('div', `act-row ${AT_CLS[type] || ''}`);
      row.innerHTML = `<div class="act-pip"></div><div class="act-body"><div class="act-tag">${esc(tag)}</div><div class="act-inf">${esc(info)}</div></div><span class="act-time">${ts()}</span>`;
      $acts.appendChild(row);
      $acts.scrollTop = $acts.scrollHeight;
      if ($acts.children.length > 50) $acts.children[0].remove();
    }

    /* Memory Cache */
    function saveFact(key, val) {
      const isNew = !facsMap[key];
      facsMap[key] = val;
      if (isNew) {
        facCount++;
        $facCnt.textContent = facCount;
        const empty = document.getElementById('chips-empty');
        if (empty) empty.remove();
      }
      const id = 'c-' + key.replace(/\W/g, '_');
      let chip = document.getElementById(id);
      if (!chip) {
        chip = el('div', 'chip');
        chip.id = id;
        $chips.appendChild(chip);
      }
      chip.innerHTML = `<span class="chip-k">${esc(key.replace(/_/g, ' '))}</span><span class="chip-v">${esc(val)}</span>`;
    }

    /* Hardware Stats Update */
    function updateStats(ev) {
      if (ev.clock) $hClk.textContent = ev.clock;
      const cpu = ev.cpu || '--';
      const ram = ev.ram || '--';
      const bat = ev.battery ? ev.battery + '%' + (ev.charging ? '⚡' : '') : '—';
      $hCpu.textContent = cpu + '%'; $hRam.textContent = ram + '%'; $hBat.textContent = bat;
      $scCpu.textContent = cpu + '%';
      $scRam.textContent = ev.ram_used && ev.ram_total ? `${ev.ram_used}/${ev.ram_total}G` : '--';
      $scBat.textContent = bat;
      $cpuF.style.width = (ev.cpu || 0) + '%';
      $ramF.style.width = (ev.ram || 0) + '%';
      $batF.style.width = (ev.battery || 0) + '%';
    }

    /* Toast Notification */
    let toastTmr = null;
    function showToast(msg) {
      let t = document.querySelector('.toast');
      if (t) t.remove();
      clearTimeout(toastTmr);
      t = el('div', 'toast');
      t.textContent = msg;
      document.body.appendChild(t);
      toastTmr = setTimeout(() => t && t.remove(), 3000);
    }

    /* Send Data */
    function send() {
      const text = $inp.value.trim();
      if (!text || !ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({ type: 'command', text }));
      addMsg('user', text);
      $inp.value = '';
    }
    $inp.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } });
    document.getElementById('send-btn').addEventListener('click', send);

    /* Visulizer — Angular/Aggressive Snake Wave */
    const vCtx = $vizCv.getContext('2d');
    const VW = 160, VH = 160, VR = 60;
    let wPhase = 0, wAmp = 4, wTarget = 4;

    const VIZ_COLORS = {
      's-listening': '#00ff66',
      's-thinking': '#ff4400',
      's-speaking': '#ccff00',
      's-wake': '#ff003c',
    };

    function drawViz() {
      const cx = VW / 2, cy = VH / 2;
      vCtx.clearRect(0, 0, VW, VH);

      // Core Hex Background
      vCtx.save();
      drawHex(vCtx, cx, cy, VR);
      vCtx.clip();
      vCtx.fillStyle = '#030304';
      vCtx.fillRect(0, 0, VW, VH);

      let col = '#ccff00'; // Default Venom Green
      for (const [cls, c] of Object.entries(VIZ_COLORS)) {
        if ($body.classList.contains(cls)) { col = c; break; }
      }

      wAmp += (wTarget - wAmp) * 0.1;
      const spd = curState === 'speaking' ? 0.3 : curState === 'listening' ? 0.2 : curState === 'thinking' ? 0.08 : 0.04;
      wPhase += spd;

      // Draw aggressive dual waves (Snake split tongue / Synapse signal)
      vCtx.beginPath();
      vCtx.strokeStyle = col;
      vCtx.lineWidth = 3;
      vCtx.shadowColor = col;
      vCtx.shadowBlur = 20;

      const points = 50;
      for (let i = 0; i <= points; i++) {
        const t = i / points;
        const x = cx - VR + (t * VR * 2);
        // Jagged math
        let y = cy +
          Math.sin(t * Math.PI * 4 + wPhase) * wAmp +
          Math.sin(t * Math.PI * 9 - wPhase * 1.5) * (wAmp * 0.5) +
          (Math.random() - 0.5) * (curState === 'thinking' ? 8 : 1); // Add "static" thinking feeling

        i === 0 ? vCtx.moveTo(x, y) : vCtx.lineTo(x, y);
      }
      vCtx.stroke();

      // Eye Pupil Core
      vCtx.shadowBlur = 10;
      vCtx.beginPath();
      vCtx.ellipse(cx, cy, 6, curState === 'wake_word' ? 20 : 10, 0, 0, Math.PI * 2);
      vCtx.fillStyle = col;
      vCtx.fill();

      vCtx.restore();
    }

    // Helper for Hexagon drawing
    function drawHex(ctx, x, y, r) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 3) * i - (Math.PI / 2);
        const px = x + r * Math.cos(angle);
        const py = y + r * Math.sin(angle);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
    }

    /* Footer Waveform */
    const WF_N = 22;
    const wfH = Array.from({ length: WF_N }, () => 4 + Math.random() * 5);
    for (let i = 0; i < WF_N; i++) $wfWrap.appendChild(el('div', 'wbar'));
    const $bars = $wfWrap.querySelectorAll('.wbar');

    function animWf() {
      const active = curState === 'listening' || curState === 'speaking';
      $bars.forEach((b, i) => {
        wfH[i] += (Math.random() - 0.5) * (active ? 20 : 2);
        wfH[i] = Math.max(4, Math.min(active ? 40 : 8, wfH[i]));
        b.style.height = wfH[i] + 'px';
        b.style.opacity = active ? '1' : '0.2';
      });
    }

    /* Core Loop */
    let tick = 0;
    function loop() {
      requestAnimationFrame(loop);
      drawViz();
      if (++tick % 2 === 0) animWf();
    }

    /* Fallback Clock */
    setInterval(() => {
      if (!$hClk.textContent || $hClk.textContent === '--:--:--') {
        const n = new Date();
        $hClk.textContent = [n.getHours(), n.getMinutes(), n.getSeconds()].map(v => String(v).padStart(2, '0')).join(':');
      }
    }, 1000);

    /* Utils */
    function el(tag, cls) { const e = document.createElement(tag); if (cls) e.className = cls; return e; }
    function clip(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

    /* Engage */
    loop();
    connect();
  </script>
</body>

</html>
